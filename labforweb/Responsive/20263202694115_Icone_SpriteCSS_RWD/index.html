<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Sprites e Object-Fit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Header</h1>
  </header>

  <main>
    <div class="grid-col">
      <div class="sprites-obj">
        <span class="icon-wrap n1"><img src="img/css_sprites.png" alt="icona 1"></span>
        <span class="icon-wrap n2"><img src="img/css_sprites.png" alt="icona 2"></span>
        <span class="icon-wrap n3"><img src="img/css_sprites.png" alt="icona 3"></span>
        <span class="icon-wrap n4"><img src="img/css_sprites.png" alt="icona 4"></span>
        <span class="icon-wrap n5"><img src="img/css_sprites.png" alt="icona 5"></span>
      </div>
    </div>
    <div class="grid-col center">Colonna Centrale</div>
    <div class="grid-col">Colonna 3</div>
  </main>

  <footer>
    <p>Footer</p>

    <div class="sprites">
      <span class="icon"></span>
      <span class="icon"></span>
      <span class="icon"></span>
      <span class="icon"></span>
      <span class="icon"></span>
    </div>
  </footer>

</body>
</html>
