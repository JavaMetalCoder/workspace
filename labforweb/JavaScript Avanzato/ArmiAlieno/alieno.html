<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOP&CODE - FZ</title>
  <link rel="stylesheet" href="/css/stili.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <header>
    <div class="h-title">
      <span>STOP&CODE - FZ</span>
    </div>
  </header>


  <main>
    <div class="container">
      <form action="#" class="card-alien">
        <h3 id="card-title">Alien Weapons</h3>
        <div class="img-container">
          <img src="img/alieno.jpg" alt="alieno in posa">
        </div>
        <input type="text" id="card-input" class="card-input" placeholder="Inserisci il valore delle vite dell'alieno qui:">
        <div class="card-btns">
          <button id="card-btns-submit" type="submit">Inizializza</button>
          <button id="card-btns-plus" type="button"> + Vite </button>
          <button id="card-btns-minus" type="button"> - Vite </button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <small>Fabio Zagaria 2026 - LABFORWEB</small>
  </footer>
  
</body>
</html>
