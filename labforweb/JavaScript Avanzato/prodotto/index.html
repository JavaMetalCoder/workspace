<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="index.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Nome Prodotto</span>
            <input type="text" class="form-control" placeholder="Inserisci il nome prodotto"  aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Prezzo Prodotto</span>
            <input type="text" class="form-control" placeholder="Inserisci il prezzo prodotto" aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Categoria</span>
            <input type="text" class="form-control" placeholder="Categoria del prodotto" aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Descrizione</span>
            <input type="text" class="form-control" placeholder="Breve descrizione del prodotto" aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Disponibilità</span>
            <input type="text" class="form-control" placeholder="Pezzi disponibili in stock" aria-describedby="basic-addon1">
        </div>
        
        <button type="button" class="btn btn-primary">Inserisci prodotto</button>
        <button type="button" class="btn btn-danger">Elimina prodotto</button>
    </div>
</body>
</html>
