<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Pokemon</title>
    <style>
        #charmanderImg,
        #squirtleImg,
        #bulbasaurImg {
            height: 230px;
            width: 230px;

        }

        .egg {
            height: 50px;
            width: 50px;
            margin: 10px;
            cursor: pointer;
        }

        body {
            text-align: center;
        }

        .eggsContainer {
            margin-top: 250px;
        }

        .cardContainer {
            height: 300px;
            width: 500px;
        }

        #charmanderCard,
        #squirtleCard,
        #bulbasaurCard {
            padding: 10px;
            box-shadow: 10px 10px 5px lightblue;
            height: 500px;
        }

        #charmanderCard {
            background-color: orange;
        }

        #squirtleCard {
            background-color: rgb(104, 166, 247);
        }

        #bulbasaurCard {
            background-color: rgb(69, 207, 69);
        }

        .card {
            height: 400px;

        }

        .cardContainer img {
            border: 1px solid rgba(0, 0, 0, .125);
            border-radius: .25rem;
            background-color: white;
        }

        h2 {
            text-align: left;
        }

        button {
            margin: 20px
        }

        .cardHistory {
            margin-top: 100px;
            border: 1px solid rgba(0, 0, 0, .125);
            border-radius: .25rem;
            padding: 20px;
            overflow-y: scroll;
            height: 300px;
            box-shadow: 10px 10px 5px lightblue;
        }
    </style>
    <script src="/js/pokemon.js" defer></script>
</head>

<body>
    <div style="margin-top: 50px;" class="d-flex justify-content-center">
        <button class="btn btn-primary rigeneraMana">Ricarica Mana</button>
        <button class="btn btn-primary attacca">Attacca</button>
    </div>
    <div style="margin-top: 50px;" class="d-flex justify-content-center">
        <div class="cardContainer d-flex justify-content-center">
        </div>
        <div class="cardHistory"></div>
    </div>
    <div class="eggsContainer">
        <img class="egg" id="eggCharmander" src="assets/uovo-pokemon.png" alt="">
        <img class="egg" id="eggSquirtle" src="assets/uovo-pokemon.png" alt="">
        <img class="egg" id="eggBulbasaur" src="assets/uovo-pokemon.png" alt="">
    </div>

    
</body>

</html>
