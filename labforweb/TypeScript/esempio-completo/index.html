<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo TS + Interfaccia</title>
  <link rel="stylesheet" href="index.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Dettagli Persona</h1>
    <div id="persona">
      <!-- I valori verranno inseriti da JavaScript/TS -->
      <p><strong>ID:</strong> <span id="persona-id"></span></p>
      <p><strong>Nome:</strong> <span id="persona-nome"></span></p>
      <p><strong>Stato:</strong> <span id="persona-stato"></span></p>
    </div>

    <h1>Dettagli Veicolo</h1>
    <div id="veicolo">
      <p><strong>Marca:</strong> <span id="veicolo-marca"></span></p>
      <p><strong>Anno:</strong> <span id="veicolo-anno"></span></p>
      <p><strong>Modello:</strong> <span id="veicolo-modello"></span></p>
    </div>

    <h1>Acquisto</h1>
    <div id="acquisto">
      <p><strong>Codice Acquisto:</strong> <span id="acquisto-id"></span></p>
    </div>
  </div>

</body>
</html>
