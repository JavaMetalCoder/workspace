<div class="card" style="width: 18rem;">
  <img [src]="corso().img" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{corso().titolo}}</h5>
    <p class="card-text">{{corso().descrizione}}</p>
    <p class="card-text">Prezzo: {{corso().prezzo}}</p>
    <p class="card-text">Data di Inizio: {{corso().dataDiInizio}}</p>

    
  </div>
</div>
