<div class="card h-100">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ turno().nomeReparto }}</h5>
    <h6 class="card-subtitle mb-2 text-muted">{{ turno().operatore }}</h6>
    <p class="card-text">
      Tipo: {{ turno().tipo }}<br>
      Data: {{ turno().data | date: 'dd/MM/yyyy' }}
    </p>
    <button class="btn btn-danger btn-sm mt-auto" (click)="handleRemove()">Rimuovi</button>
  </div>
</div>
