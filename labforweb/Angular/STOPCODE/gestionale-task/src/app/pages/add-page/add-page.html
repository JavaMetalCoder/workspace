<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h1 class="mb-4">Aggiungi Task: </h1>
      <form #addTask="ngForm">
        <div class="mb-3">
          <label for="taskTitle" class="form-label">Titolo Task</label>
          <input type="text" class="form-control" id="taskTitle" placeholder="Inserisci il titolo del task" required>
        </div>
        <div class="mb-3">
          <label for="taskDescription" class="form-label">Descrizione</label>
          <textarea class="form-control" id="taskDescription" rows="4" placeholder="Inserisci la descrizione del task"></textarea>
        </div>
        <div class="mb-3">
          <label for="taskPriority" class="form-label">Priorità</label>
          <select class="form-select" id="taskPriority">
            <option value="">Seleziona priorità</option>
            <option value="bassa">Bassa</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
        
        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button type="submit" class="btn btn-primary">Aggiungi Task</button>
          <button type="reset" class="btn btn-secondary">Annulla</button>
        </div>
      </form>
    </div>
  </div>
</div>
