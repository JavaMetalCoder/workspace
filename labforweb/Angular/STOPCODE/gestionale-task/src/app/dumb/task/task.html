@let t = task();

<section class="list-group-item d-flex justify-content-between align-items-center">
  <div class="d-flex flex-column gap-2">
    <h5>{{t.title}}</h5>
    <p [class]="t.urgency">{{ t.urgency.toUpperCase() }}</p>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="button" role="button"
    [routerLink]="['/dettaglio', t.id]" 
    >Dettaglio</button>
    <button class="btn btn-danger" type="button" role="button"
    (click)="removeTask(t.id)">Elimina</button>
  </div> 
</section>
